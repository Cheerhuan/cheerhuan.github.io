<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Quotation Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #07070f; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; position: relative; overflow-x: hidden; }
        body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(ellipse 80% 60% at 20% 20%, rgba(6, 182, 212, 0.08) 0%, transparent 60%), radial-gradient(ellipse 60% 50% at 80% 80%, rgba(139, 92, 246, 0.06) 0%, transparent 60%), radial-gradient(ellipse 50% 40% at 50% 50%, rgba(6, 182, 212, 0.03) 0%, transparent 60%); pointer-events: none; z-index: 0; animation: ambientShift 20s ease-in-out infinite alternate; }
        @keyframes ambientShift { 0% { transform: scale(1) rotate(0deg); opacity: 0.6; } 50% { transform: scale(1.05) rotate(2deg); opacity: 1; } 100% { transform: scale(0.98) rotate(-2deg); opacity: 0.7; } }
        body::after { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px); background-size: 60px 60px; pointer-events: none; z-index: 0; }
        .glass { background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(24px) saturate(1.2); -webkit-backdrop-filter: blur(24px) saturate(1.2); border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 1.25rem; box-shadow: 0 8px 60px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05); transition: border-color 0.3s ease, box-shadow 0.3s ease; }
        .glass:hover { border-color: rgba(255, 255, 255, 0.10); box-shadow: 0 8px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.08); }
        .glass-input { background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(16px) saturate(1.2); -webkit-backdrop-filter: blur(16px) saturate(1.2); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 0.875rem; color: #f1f5f9; transition: all 0.25s ease; outline: none; width: 100%; padding: 0.875rem 1.125rem; font-size: 0.95rem; font-weight: 400; }
        .glass-input::placeholder { color: rgba(255, 255, 255, 0.25); font-weight: 300; }
        .glass-input:focus { border-color: rgba(6, 182, 212, 0.4); box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.08), 0 4px 30px rgba(6, 182, 212, 0.05); background: rgba(255, 255, 255, 0.06); }
        .glass-input.textarea { resize: vertical; min-height: 130px; line-height: 1.6; }
        .btn-primary { background: linear-gradient(135deg, rgba(6, 182, 212, 0.85), rgba(59, 130, 246, 0.85)); color: #fff; font-weight: 600; font-size: 1.05rem; padding: 0.9rem 2.2rem; border-radius: 0.875rem; border: none; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 30px rgba(6, 182, 212, 0.15); position: relative; overflow: hidden; letter-spacing: 0.01em; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 40px rgba(6, 182, 212, 0.25); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
        .btn-copy { background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.08); color: rgba(255, 255, 255, 0.6); padding: 0.4rem 0.9rem; border-radius: 0.6rem; font-size: 0.75rem; cursor: pointer; transition: all 0.25s ease; font-weight: 500; display: inline-flex; align-items: center; gap: 0.4rem; backdrop-filter: blur(8px); }
        .btn-copy:hover { background: rgba(255, 255, 255, 0.10); color: #fff; transform: scale(1.03); }
        .result-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px) saturate(1.2); border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 1.25rem; padding: 1.5rem; transition: all 0.35s ease; box-shadow: 0 4px 40px rgba(0, 0, 0, 0.2); height: 100%; display: flex; flex-direction: column; }
        .result-card:hover { transform: translateY(-3px); border-color: rgba(255, 255, 255, 0.10); }
        .result-card .label { font-size: 0.65rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255, 255, 255, 0.3); margin-bottom: 0.5rem; }
        .result-card .content { color: rgba(255, 255, 255, 0.85); font-size: 0.95rem; line-height: 1.7; flex: 1; white-space: pre-wrap; word-break: break-word; }
        .result-card .content.empty { color: rgba(255, 255, 255, 0.15); font-style: italic; }
        .accent-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 0.5rem; }
        .accent-dot.cyan { background: #06b6d4; box-shadow: 0 0 12px rgba(6, 182, 212, 0.4); }
        .accent-dot.purple { background: #8b5cf6; box-shadow: 0 0 12px rgba(139, 92, 246, 0.4); }
        .accent-dot.amber { background: #f59e0b; box-shadow: 0 0 12px rgba(245, 158, 11, 0.4); }
        .accent-dot.rose { background: #f43f5e; box-shadow: 0 0 12px rgba(244, 63, 94, 0.4); }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 2.5px solid rgba(255, 255, 255, 0.15); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 0.6rem; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .fade-up { opacity: 0; transform: translateY(18px); animation: fadeUp 0.6s ease forwards; }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
        .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(80px); background: rgba(15, 15, 30, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); color: #f1f5f9; padding: 0.75rem 1.5rem; border-radius: 1rem; font-size: 0.9rem; transition: all 0.4s ease; pointer-events: none; z-index: 100; display: flex; align-items: center; gap: 0.7rem; opacity: 0; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .model-badge { font-size: 0.65rem; font-weight: 500; color: rgba(255, 255, 255, 0.2); background: rgba(255, 255, 255, 0.04); border-radius: 999px; padding: 0.2rem 0.8rem; border: 1px solid rgba(255, 255, 255, 0.04); }
    </style>
</head>
